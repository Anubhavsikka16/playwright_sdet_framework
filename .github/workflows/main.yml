name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    environment: env_prod

    env:
      ENV: production
      BASE_URL: ${{ secrets.BASE_URL }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
      HEADLESS: ${{ secrets.HEADLESS }}

    steps:
      # 📥 Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🐍 Python setup
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 🟢 Node setup (FIXED INDENTATION)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 📦 Install Cypress app deps
      - name: Install app dependencies
        run: |
          cd cypress-realworld-app
          yarn install

      # 🗄️ Seed DB
      - name: Seed DB
        run: |
          cd cypress-realworld-app
          yarn db:seed:dev

      # 🚀 Start app
      - name: Start app
        run: |
          cd cypress-realworld-app
          export TS_NODE_TRANSPILE_ONLY=true
          yarn dev &

      # ⏳ Wait for app (BETTER than sleep)
      - name: Wait for app
        run: npx wait-on http://localhost:3000

      # 🐍 Install Python deps
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install playwright pytest-playwright python-dotenv
          pip install allure-pytest pytest-html pytest-xdist requests
          playwright install --with-deps

      # 🧪 Run tests
      - name: Run Playwright Tests
        run: pytest