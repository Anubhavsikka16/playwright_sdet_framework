name: Playwright Tests

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:
  test:

    runs-on: ubuntu-latest
    environment: env_prod
    env:
      ENV: production
      BASE_URL: ${{ secrets.BASE_URL }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
      HEADLESS: ${{ secrets.HEADLESS }}
      #added serets for env variables to be used in the tests
    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 🟢 Setup Node (VERY IMPORTANT for Cypress app)
    - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 📦 Install app dependencies
    - name: Install app dependencies
        run: |
          cd cypress-realworld-app
          yarn install

      # 🗄️ Seed database
    - name: Seed DB
        run: |
          cd cypress-realworld-app
          yarn db:seed:dev

      # 🚀 Start app (frontend + backend)
    - name: Start app
        run: |
          cd cypress-realworld-app
          export TS_NODE_TRANSPILE_ONLY=true
          yarn dev &
          sleep 15   # wait for app to start

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright pytest-playwright
        pip install python-dotenv
        pip install allure-pytest pytest-html pytest-xdist requests
        playwright install --with-deps

    - name: Run Playwright Tests
      run: pytest
